<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOWCollective | Strings of Worship</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0f0f1e;
            --bg-panel: #1a1a2e;
            --gold: #c9a84c;
            --text-main: #e0e0e0;
            --sidebar-width: 220px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; 
            background: var(--bg-deep); 
            color: var(--text-main);
            font-family: 'Lato', sans-serif;
            overflow: hidden; /* Prevent bounce */
        }

        h1, h2, h3, .cinzel { font-family: 'Cinzel', serif; color: var(--gold); }

        /* CRITICAL REQUIREMENT: Fixed App Shell */
        #app-shell {
            position: fixed;
            inset: 0;
            display: flex;
        }

        /* Desktop Sidebar */
        #sidebar {
            width: var(--sidebar-width);
            background: var(--bg-panel);
            border-right: 1px solid rgba(201, 168, 76, 0.2);
            padding: 20px;
            display: none;
        }

        /* Main Content Container */
        #viewport {
            position: relative;
            flex: 1;
            height: 100%;
        }

        /* CRITICAL REQUIREMENT: Absolute Pages */
        .page {
            position: absolute;
            inset: 0;
            background: var(--bg-deep);
            display: none;
            overflow-y: auto;
            padding: 20px 20px 100px 20px; /* Space for mobile nav */
        }

        .page.active { display: block; }

        /* UI Elements */
        .card {
            background: var(--bg-panel);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 3px solid var(--gold);
        }

        .btn {
            background: var(--gold);
            color: var(--bg-deep);
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Navigation */
        #mobile-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: var(--bg-panel);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid var(--gold);
            z-index: 1000;
        }

        .nav-item {
            font-size: 10px;
            text-align: center;
            color: var(--text-main);
            opacity: 0.6;
            cursor: pointer;
        }

        .nav-item.active { opacity: 1; color: var(--gold); }

        /* Songs & Chords */
        .chord-line { display: flex; flex-wrap: wrap; margin-bottom: 10px; }
        .chord-unit { display: flex; flex-direction: column; margin-right: 8px; }
        .chord { color: var(--gold); font-weight: bold; min-height: 1.2em; }
        
        /* Pulpit View */
        #pulpit-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-deep);
            z-index: 2000;
            display: none;
            padding: 40px;
        }
        #timer-display {
            font-size: 80px;
            text-align: center;
            font-family: monospace;
            margin-top: 50px;
        }
        .timer-warning { color: orange; }
        .timer-over { color: #ff4d4d; }

        @media (min-width: 481px) {
            #sidebar { display: flex; flex-direction: column; }
            #mobile-nav { display: none; }
            .page { padding-bottom: 20px; }
        }

        @media (max-width: 480px) {
            #viewport { max-width: 480px; margin: 0 auto; }
        }
    </style>
</head>
<body>

<div id="app-shell">
    <div id="sidebar">
        <h2 style="font-size: 1.2rem;">SOWCollective</h2>
        <div onclick="showPage('home')" class="nav-item">HOME</div>
        <div onclick="showPage('songs')" class="nav-item">SONGS</div>
        <div onclick="showPage('mysongs')" class="nav-item">MY SONGS</div>
        <div onclick="showPage('books')" class="nav-item">BOOKS</div>
        <div onclick="showPage('sermons')" class="nav-item">SERMONS</div>
    </div>

    <div id="viewport">
        <div id="home" class="page active">
            <h2 class="cinzel">Dashboard</h2>
            <div id="youtube-hero" class="card">
                <p>Latest Release</p>
                <div style="background:#000; aspect-ratio: 16/9; display:flex; align-items:center; justify-content:center;">
                    [YouTube Placeholder]
                </div>
            </div>
            <h3>Recent Books</h3>
            <div id="recent-books" style="display:flex; gap:10px;"></div>
        </div>

        <div id="songs" class="page">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 class="cinzel">Chords</h2>
                <div>
                    <button class="btn" onclick="transpose(-1)">-</button>
                    <span id="current-key">Key: C</span>
                    <button class="btn" onclick="transpose(1)">+</button>
                </div>
            </div>
            <div id="song-viewer" class="card">
                </div>
        </div>

        <div id="mysongs" class="page">
            <h2 class="cinzel">My Compositions</h2>
            <div id="my-songs-list"></div>
        </div>

        <div id="books" class="page">
            <h2 class="cinzel">Library</h2>
            <div class="card">
                <input type="text" id="ai-query" placeholder="Ask Theology AI..." style="width:70%; background:#0f0f1e; border:1px solid var(--gold); color:white; padding:5px;">
                <button class="btn" onclick="askAI()">Search</button>
            </div>
            <div id="bookshelf" style="display:flex; flex-wrap:wrap; gap:10px;"></div>
        </div>

        <div id="sermons" class="page">
            <h2 class="cinzel">Sermon Notes</h2>
            <button class="btn" onclick="startPulpit()">Enter Pulpit Mode</button>
            <div id="sermon-list" style="margin-top:20px;"></div>
        </div>
    </div>
</div>

<div id="pulpit-overlay">
    <button class="btn" onclick="closePulpit()">Exit</button>
    <div id="timer-display">00:00</div>
    <div id="pulpit-content" style="font-size: 1.5rem; margin-top: 30px;"></div>
</div>

<nav id="mobile-nav">
    <div class="nav-item active" onclick="showPage('home')">🏠<br>Home</div>
    <div class="nav-item" onclick="showPage('songs')">🎵<br>Songs</div>
    <div class="nav-item" onclick="showPage('mysongs')">✍️<br>Mine</div>
    <div class="nav-item" onclick="showPage('books')">📚<br>Books</div>
    <div class="nav-item" onclick="showPage('sermons')">🎤<br>Sermon</div>
</nav>

<script>
    // --- SAMPLE DATA ---
    const songs = [
        { title: "Worthy of it All", key: "C", lines: [
            { chords: ["C", "G", "Am", "F"], words: ["All", "the", "saints", "cry"] }
        ]},
        { title: "Great Are You Lord", key: "A", lines: [
            { chords: ["D", "F#m", "E"], words: ["It's", "Your", "breath"] }
        ]}
    ];

    const mySongs = [
        { title: "Morning Dew", status: "Recording Soon", type: "Lyrics/Audio" }
    ];

    const books = [
        { title: "Knowledge of the Holy", color: "#c9a84c" },
        { title: "Desiring God", color: "#4c66c9" }
    ];

    // --- NAVIGATION LOGIC ---
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        
        document.querySelectorAll('.nav-item').forEach(n => {
            n.classList.toggle('active', n.innerText.toLowerCase().includes(pageId.substring(0,3)));
        });
    }

    // --- TRANSPOSITION ENGINE ---
    const keys = ["C", "C#", "D", "Eb", "E", "F", "F#", "G", "Ab", "A", "Bb", "B"];
    let currentTranspose = 0;

    function transpose(dir) {
        currentTranspose = (currentTranspose + dir + 12) % 12;
        renderSong();
    }

    function renderSong() {
        const song = songs[0];
        let html = `<h3>${song.title}</h3>`;
        song.lines.forEach(line => {
            html += `<div class="chord-line">`;
            line.words.forEach((word, idx) => {
                const baseKeyIndex = keys.indexOf(line.chords[idx]);
                const newChord = keys[(baseKeyIndex + currentTranspose) % 12];
                html += `<div class="chord-unit"><span class="chord">${newChord}</span><span>${word}</span></div>`;
            });
            html += `</div>`;
        });
        document.getElementById('song-viewer').innerHTML = html;
        document.getElementById('current-key').innerText = `Key: ${keys[currentTranspose]}`;
    }

    // --- PULPIT TIMER ---
    let timerInterval;
    let secondsElapsed = 0;
    function startPulpit() {
        document.getElementById('pulpit-overlay').style.display = 'block';
        secondsElapsed = 0;
        timerInterval = setInterval(() => {
            secondsElapsed++;
            let mins = Math.floor(secondsElapsed / 60);
            let secs = secondsElapsed % 60;
            const display = document.getElementById('timer-display');
            display.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            
            // Logic: Target 20 mins for demo
            if (mins >= 15) display.className = 'timer-warning';
            if (mins >= 20) display.className = 'timer-over';
        }, 1000);
    }

    function closePulpit() {
        document.getElementById('pulpit-overlay').style.display = 'none';
        clearInterval(timerInterval);
    }

    // --- INIT ---
    window.onload = () => {
        renderSong();
        // Render Books Spines
        books.forEach(b => {
            const div = document.createElement('div');
            div.style.cssText = `width:30px; height:120px; background:${b.color}; border-radius:2px; writing-mode:vertical-rl; padding:5px; font-size:12px;`;
            div.innerText = b.title;
            document.getElementById('bookshelf').appendChild(div);
        });
    };

    async function askAI() {
        const query = document.getElementById('ai-query').value;
        alert("Connecting to Claude API... Ensure you have added your API proxy to the script.");
    }
</script>

</body>
</html>
